{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
<div class="wrapper">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand-mark">
                <i class="fa-solid fa-seedling"></i>
            </div>
            <div>
                <p class="brand-title">АгроПуть</p>
                <p class="brand-subtitle">Профориентация в агросфере</p>
            </div>
        </div>

        <ul class="menu">
            <li>
                <a href="{% url 'index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i>
                    <span>Главная</span>
                </a>
            </li>
            <li>
                <a href="{% url 'quiz' %}" class="{% if request.resolver_match.url_name == 'quiz' %}active{% endif %}">
                    <i class="fa-solid fa-list-check"></i>
                    <span>Тест</span>
                </a>
            </li>
            <li>
                <a href="{% url 'catalog' %}" class="{% if request.resolver_match.url_name == 'catalog' %}active{% endif %}">
                    <i class="fa-solid fa-briefcase"></i>
                    <span>Профессии</span>
                </a>
            </li>
            <li>
                <a href="{% url 'map' %}" class="{% if request.resolver_match.url_name == 'map' %}active{% endif %}">
                    <i class="fa-solid fa-map-location-dot"></i>
                    <span>Учебные заведения</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-note">
            Пройдите тест, выберите профессию и посмотрите, где можно получить подходящее образование.
        </div>
    </aside>

    <main class="content">
        {% block content %}
        {% endblock %}
    </main>
</div>
</body>
</html>
